name: Deploy Go server (Azure Container Apps)

on:
  push:
    branches: [main]
    paths:
      - "apps/go-server/**"
      - ".github/workflows/deploy-go-server.yml"
  workflow_dispatch: {}

env:
  GO_VERSION: "1.26"
  WORKDIR: apps/go-server

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/go-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/go-server/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

  # Runs only on the main branch after build-and-test passes. Requires these
  # repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
  # (federated OIDC — see azure/login docs), ACR_LOGIN_SERVER, ACR_USERNAME,
  # ACR_PASSWORD, RESOURCE_GROUP, CONTAINERAPP_API_NAME, CONTAINERAPP_WORKER_NAME.
  build-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write # required for OIDC federated Azure login
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          target: api
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/bitwise-api:${{ steps.vars.outputs.tag }},${{ secrets.ACR_LOGIN_SERVER }}/bitwise-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKDIR }}
          target: worker
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/bitwise-worker:${{ steps.vars.outputs.tag }},${{ secrets.ACR_LOGIN_SERVER }}/bitwise-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy api revision
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.CONTAINERAPP_API_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/bitwise-api:${{ steps.vars.outputs.tag }}

      - name: Deploy worker revision
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ secrets.CONTAINERAPP_WORKER_NAME }} \
              --resource-group ${{ secrets.RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/bitwise-worker:${{ steps.vars.outputs.tag }}
